version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: fitness_db
    environment:
      POSTGRES_DB: fitness_db
      POSTGRES_USER: fitness
      POSTGRES_PASSWORD: fitness
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./data.sql:/docker-entrypoint-initdb.d/02_data.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitness -d fitness_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: fitness_api
    environment:
      DATABASE_URL: postgresql://fitness:fitness@db:5432/fitness_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
