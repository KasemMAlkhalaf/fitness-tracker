version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: fitness_postgres
    environment:
      POSTGRES_DB:       fitness
      POSTGRES_USER:     fitness
      POSTGRES_PASSWORD: fitness
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./data.sql:/docker-entrypoint-initdb.d/02_data.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitness -d fitness"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: fitness_api
    environment:
      DATABASE_URL: postgres://fitness:fitness@postgres:5432/fitness?sslmode=disable
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
